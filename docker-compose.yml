version: '3.8'

services:
  emage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emage-app
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.docker.compose.project=emage"
      - "description=Client-side image manipulation tool"
